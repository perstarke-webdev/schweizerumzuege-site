locale: "de-CH"
lang: "de-CH"
title: "Schweizer Umzüge"
description: "Umzugsunternehmen für Privat- und Geschäftsumzüge in Bern, Basel und Zürich. Transparente Offerten, saubere Planung und persönliche Betreuung."
url: "https://schweizerumzuege.ch"
production_url: "https://schweizerumzuege.ch"
baseurl: ""
repository: "schweizerumzuege-site"
timezone: Europe/Zurich
logo: "/assets/images/logo.png"
og_image: "/assets/images/social/og-image.jpg"
noindex_site: true

formspark_endpoint: "https://submit-form.com/qmOOtdX2O"

include:
  - _pages

exclude:
  - briefing
  - Briefing
  - _site
  - .jekyll-cache
  - .sass-cache
  - .bundle
  - vendor
  - node_modules
  - Gemfile.lock
  - .tmp-validation
  - docker-compose.yml

markdown: kramdown
highlighter: rouge
permalink: /blog/:slug/

kramdown:
  input: GFM
  hard_wrap: false

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
