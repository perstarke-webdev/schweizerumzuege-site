home_faq:
  - question: "Wie unterstützt Ihr Team meinen Umzug in der Schweiz individuell?"
    answer: "Unser engagiertes Team begleitet Sie von der Planung bis zum Einzug. Wir bieten flexible Umzugslösungen, die perfekt auf Ihre Bedürfnisse zugeschnitten sind — egal ob nur wenige Kartons oder Ihre ganze Wohnung."
  - question: "Welche zusätzlichen Services bietet Ihr Umzugsunternehmen an?"
    answer: "Zu unseren Leistungen zählen nicht nur der Transport, sondern auch professionelles Verpacken, Einrichten und Entsorgen. Auf Wunsch kümmern wir uns auch um spezielle Möbel oder wertvolle Gegenstände, damit Ihr Umzug sicher und stressfrei verläuft."
  - question: "Wie sichert Ihr Unternehmen die Qualität beim Umzug in der Schweiz?"
    answer: "Wir setzen auf erfahrene Fachkräfte und modernes Equipment. Durch regelmässige Schulungen und Ihren direkten Ansprechpartner stellen wir sicher, dass Ihr Umzug reibungslos und mit höchster Qualität abläuft."
  - question: "Bieten Sie auch Lagerung für Möbel an?"
    answer: "Ja. Wir verfügen über klimatisierte Lagerräume mit insgesamt rund 50 000 m² Möbellagerung — sicher, jederzeit zugänglich und sowohl kurz- als auch langfristig buchbar."
  - question: "Wie schnell erhalte ich eine Offerte?"
    answer: "In der Regel innerhalb von 24 Stunden. Bei komplexeren Umzügen vereinbaren wir gerne einen kostenlosen Besichtigungstermin vor Ort, damit das Angebot zu 100% passt."

services_faq:
  - question: "Welche Leistungen kann ich kombinieren?"
    answer: "Alle Dienstleistungen können flexibel kombiniert werden."
  - question: "Kann ich nur einzelne Leistungen buchen?"
    answer: "Ja, Leistungen können individuell ausgewählt werden."
  - question: "Wie wird der Umfang festgelegt?"
    answer: "Basierend auf Ihrer Anfrage und gegebenenfalls einer Besichtigung."
  - question: "Sind kurzfristige Termine möglich?"
    answer: "Je nach Verfügbarkeit."

contact_faq:
  - question: "Wie schnell erhalte ich eine Offerte?"
    answer: "In der Regel innerhalb von 24 Stunden."
  - question: "Ist die Offerte wirklich unverbindlich?"
    answer: "Ja, die Anfrage ist kostenlos und unverbindlich."
  - question: "Muss ich alles genau angeben?"
    answer: "Nein. Auch grobe Angaben reichen für eine erste Einschätzung."
  - question: "Kann ich auch nur anrufen?"
    answer: "Ja, Sie können uns jederzeit telefonisch kontaktieren."
