services:
  - slug: "privatumzuege"
    icon: "home"
    title: "Privatumzüge"
    short: "Wir planen Ihren Wohnungswechsel sauber, pünktlich und passend zu Ihrem Bedarf."
    long: "Ob kleine Wohnung oder Familienhaushalt: Wir begleiten Ihren Privatumzug von der Planung bis zum letzten Möbelstück. Sie entscheiden, wie viel Unterstützung Sie brauchen."
    detail: "Planbarer Support für Wohnungswechsel jeder Grösse."
    bullets: ["Persönliche Planung", "Packen, Transport und Montage", "Termintreue Durchführung"]
    cta_label: "Offerte für Privatumzug anfragen"
    image: "/assets/images/services/private.webp"
  - slug: "geschaeftsumzuege"
    icon: "building"
    title: "Geschäftsumzüge"
    short: "Büro- und Firmenumzüge mit klarer Planung und wenig Unterbruch im Betrieb."
    long: "Bei Geschäftsumzügen zählen Timing und Koordination. Wir planen den Ablauf mit Ihnen so, dass Teams, Arbeitsplätze und Infrastruktur möglichst schnell wieder einsatzbereit sind."
    detail: "Koordinierte Firmenumzüge mit minimalen Betriebsunterbrüchen."
    bullets: ["Planung nach Betriebsablauf", "Saubere Koordination vor Ort", "Möglichst kurze Unterbrechung"]
    cta_label: "Offerte für Geschäftsumzug anfragen"
    image: "/assets/images/services/business.webp"
  - slug: "reinigung"
    icon: "spray"
    title: "Reinigung"
    short: "Umzugsreinigung, abgestimmt auf Termin und Objekt."
    long: "Wenn Reinigung und Umzug zusammenlaufen, sparen Sie zusätzlichen Abstimmungsaufwand. Wir koordinieren die Reinigung passend zu Ihrem Termin und Ihrem Objekt."
    detail: "Reinigung, die sich sauber in den Umzug einfügt."
    bullets: ["Abgestimmt auf Ihren Termin", "Für Wohnungen, Häuser und Gewerbe", "Weniger Koordinationsaufwand"]
    cta_label: "Reinigung anfragen"
    image: "/assets/images/process/care.webp"
  - slug: "raeumung"
    icon: "box"
    title: "Räumung"
    short: "Zuverlässige Räumungen für Wohnungen, Häuser und Geschäftsräume."
    long: "Bei einer Räumung braucht es Übersicht und Verlässlichkeit. Wir organisieren den Ablauf so, dass Termine, Zugänge und Entsorgung sauber koordiniert sind."
    detail: "Räumungen mit klarer Organisation und verlässlicher Umsetzung."
    bullets: ["Klare Ablaufplanung", "Sorgfältige Ausführung", "Koordinierte Entsorgung"]
    cta_label: "Räumung anfragen"
    image: "/assets/images/impressions/apartment.webp"
  - slug: "lagerung"
    icon: "warehouse"
    title: "Lagerung"
    short: "Sichere Lagerung für Möbel, Kartons und einzelne Gegenstände."
    long: "Wenn zwischen Auszug und Einzug Zeit liegt, schaffen wir Platz. Ihre Möbel und Gegenstände können kurz- oder langfristig sicher eingelagert werden."
    detail: "Kurz- und langfristige Lagerlösungen für Ihren Umzug."
    bullets: ["Kurz- und langfristig möglich", "Sichere Unterbringung", "Einfach in den Umzug integrierbar"]
    cta_label: "Lagerung anfragen"
    image: "/assets/images/services/storage.webp"
  - slug: "umzugsplanung"
    icon: "clipboard"
    title: "Umzugsplanung"
    short: "Damit Ihr Umzug planbar bleibt, bevor der erste Karton getragen wird."
    long: "Eine gute Umzugsplanung spart Zeit, Rückfragen und unnötigen Aufwand. Wir klären früh, was gebraucht wird, wie der Ablauf aussieht und welche Leistungen sinnvoll sind."
    detail: "Planung, Koordination und klare nächste Schritte vor dem Umzug."
    bullets: ["Bedarf früh klären", "Ablauf transparent abstimmen", "Leistungen passend zusammenstellen"]
    cta_label: "Planung starten"
    image: "/assets/images/services/planning.webp"

