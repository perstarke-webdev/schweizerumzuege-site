home_faq:
  - question: "Wie unterstützt Ihr Team meinen Umzug in der Schweiz individuell?"
    answer: "Wir planen den Umzug nach Ihrem Objekt, Ihrem Termin und den Leistungen, die Sie wirklich brauchen. Sie entscheiden, ob Sie nur den Transport oder auch Packen, Montage, Reinigung oder Lagerung möchten."
  - question: "Welche zusätzlichen Services bietet Ihr Umzugsunternehmen an?"
    answer: "Neben dem Transport übernehmen wir auf Wunsch Packen, Montage, Reinigung, Räumung, Entsorgung und Lagerung."
  - question: "Wie sichert Ihr Unternehmen die Qualität beim Umzug in der Schweiz?"
    answer: "Wir arbeiten mit erfahrenem Personal, klaren Abläufen und persönlicher Betreuung. So bleiben Termine, Zuständigkeiten und Qualität nachvollziehbar."
  - question: "Bieten Sie auch Lagerung für Möbel an?"
    answer: "Ja. Für Möbel und Gegenstände stehen Lagerflächen mit rund 50 000 m² zur Verfügung, kurz- oder langfristig."
  - question: "Wie schnell erhalte ich eine Offerte?"
    answer: "In der Regel innerhalb von 24 Stunden. Wenn mehr Details nötig sind, vereinbaren wir eine Besichtigung und erstellen die Offerte auf dieser Basis."

services_faq:
  - question: "Welche Leistungen kann ich kombinieren?"
    answer: "Fast alle Leistungen lassen sich kombinieren, zum Beispiel Transport plus Reinigung oder Lagerung."
  - question: "Kann ich nur einzelne Leistungen buchen?"
    answer: "Ja. Sie können auch nur einzelne Leistungen wie Reinigung, Räumung oder Lagerung anfragen."
  - question: "Wie wird der Umfang festgelegt?"
    answer: "Den Umfang klären wir anhand Ihrer Angaben und bei Bedarf bei einer Besichtigung vor Ort."
  - question: "Sind kurzfristige Termine möglich?"
    answer: "Je nach Termin und Aufwand sind auch kurzfristige Einsätze möglich. Fragen Sie uns am besten direkt an."

contact_faq:
  - question: "Wie schnell erhalte ich eine Offerte?"
    answer: "Meist innerhalb von 24 Stunden. Bei komplexeren Umzügen kann es etwas länger dauern, wenn wir zuerst Rückfragen klären."
  - question: "Ist die Offerte wirklich unverbindlich?"
    answer: "Ja. Die Anfrage ist kostenlos und verpflichtet Sie zu nichts."
  - question: "Muss ich alles genau angeben?"
    answer: "Nein. Grobe Angaben reichen für den Start. Fehlende Details klären wir anschliessend direkt mit Ihnen."
  - question: "Kann ich auch nur anrufen?"
    answer: "Ja. Wenn Sie lieber direkt sprechen, können Sie uns jederzeit telefonisch kontaktieren."
