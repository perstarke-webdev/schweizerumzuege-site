services:
  - slug: "privatumzuege"
    icon: "home"
    title: "Privatumzüge"
    short: "Professionelle Unterstützung für Ihren Wohnungswechsel, organisiert und passend zu Ihrem Bedarf."
    long: "Ein Wohnungswechsel bringt viele Aufgaben mit sich. Schweizer Umzüge unterstützt Sie mit klarer Planung, zuverlässiger Durchführung und einer Lösung, die zu Ihrem Bedarf passt."
    detail: "Komplette Unterstützung für Ihren Wohnungswechsel, organisiert und individuell abgestimmt."
    bullets: ["Individuelle Planung", "Flexible Leistungen", "Strukturierter Ablauf"]
    cta_label: "Offerte für Privatumzug anfragen"
    image: "/assets/images/services/private.webp"
  - slug: "geschaeftsumzuege"
    icon: "building"
    title: "Geschäftsumzüge"
    short: "Effiziente Umzugslösungen für Unternehmen und Büros."
    long: "Ein Büroumzug erfordert präzise Organisation. Schweizer Umzüge sorgt dafür, dass Ihr Umzug effizient durchgeführt wird und Abläufe möglichst wenig gestört werden."
    detail: "Effiziente Lösungen für Unternehmen und Büros, mit klarer Planung und minimaler Unterbrechung."
    bullets: ["Klare Planung", "Effiziente Umsetzung", "Strukturierter Ablauf"]
    cta_label: "Offerte für Geschäftsumzug anfragen"
    image: "/assets/images/services/business.webp"
  - slug: "reinigung"
    icon: "spray"
    title: "Reinigung"
    short: "Professionelle Reinigung rund um den Umzug."
    long: "Reinigungsleistungen können direkt in den Umzug integriert werden. So entsteht ein klarer und nahtloser Ablauf ohne zusätzliche Koordination."
    detail: "Professionelle Reinigung als Teil Ihres Umzugs, abgestimmt auf Ihre Anforderungen."
    bullets: ["Einfache Integration", "Abgestimmte Leistungen", "Zuverlässige Durchführung"]
    cta_label: "Reinigung anfragen"
    image: "/assets/images/process/care.webp"
  - slug: "raeumung"
    icon: "box"
    title: "Räumung"
    short: "Strukturierte Unterstützung bei Räumungen."
    long: "Bei Räumungen unterstützt Schweizer Umzüge mit einer strukturierten und zuverlässigen Durchführung, abgestimmt auf Ihre Situation."
    detail: "Zuverlässige Räumung von Wohnungen, Häusern und Geschäftsräumen."
    bullets: ["Klare Organisation", "Zuverlässige Umsetzung", "Strukturierter Ablauf"]
    cta_label: "Räumung anfragen"
    image: "/assets/images/impressions/apartment.webp"
  - slug: "lagerung"
    icon: "warehouse"
    title: "Lagerung"
    short: "Flexible Lagerungslösungen für Möbel und Gegenstände."
    long: "Für Möbel und Gegenstände stehen flexible Lagerlösungen zur Verfügung, die kurz- oder langfristig genutzt werden können."
    detail: "Flexible Lagerungslösungen für Möbel und Gegenstände, kurz- oder langfristig."
    bullets: ["Flexible Nutzung", "Sichere Lagerung", "Einfache Organisation"]
    cta_label: "Lagerung anfragen"
    image: "/assets/images/services/storage.webp"
  - slug: "umzugsplanung"
    icon: "clipboard"
    title: "Umzugsplanung"
    short: "Klare Planung und Koordination für einen reibungslosen Ablauf."
    long: "Eine gute Planung ist die Grundlage für einen erfolgreichen Umzug. Schweizer Umzüge sorgt für einen klaren Ablauf und eine koordinierte Umsetzung."
    detail: "Strukturierte Planung und Koordination für einen reibungslosen Ablauf."
    bullets: ["Strukturierte Planung", "Klare Kommunikation", "Abgestimmter Ablauf"]
    cta_label: "Planung starten"
    image: "/assets/images/services/planning.webp"

