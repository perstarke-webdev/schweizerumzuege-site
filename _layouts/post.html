---
layout: default
---
<article>
  <section class="page-hero post-hero">
    <div class="site-shell site-shell--narrow">
      <p class="eyebrow" data-reveal>Blog</p>
      <p class="post-hero__meta" data-reveal>{{ page.date | date: "%d.%m.%Y" }}</p>
      <h1 class="post-hero__title" data-reveal>{{ page.title }}</h1>
      {% if page.description %}
        <p class="lead" data-reveal>{{ page.description }}</p>
      {% endif %}
      {% if page.image %}
        <div class="post-hero__image" data-reveal>
          <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title }}" width="1200" height="675" loading="eager" decoding="async">
        </div>
      {% endif %}
    </div>
  </section>

  <div class="post-content">
    {{ content }}

    <nav class="post-nav" aria-label="Beitragsnavigation">
      <a class="link-arrow" href="{{ '/blog/' | relative_url }}">
        {% include icon.html name="arrow-right" size=16 %}
        <span>Zurück zur Blogübersicht</span>
      </a>
      <a class="button button--secondary button--sm" href="{{ '/kontakt/' | relative_url }}">Kostenlose Offerte anfragen</a>
    </nav>
  </div>
</article>
